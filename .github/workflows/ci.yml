name: "Terraform CI/CD Unificado - Seguridad & Calidad"

on:
  push:
    branches:
      - main
      - automatización
      - codigo-infraestructura
      - politicas
  pull_request:
    branches:
      - main
      - automatización
      - codigo-infraestructura
      - politicas

jobs:
  lint-and-validate:
    name: "Lint & Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install TFLint
        run: curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      # Formatea los archivos de la raíz. Quitamos -check para evitar bloqueos por espacios.
      - name: Terraform Format
        run: terraform fmt -recursive

      # Inicializa y valida directamente en la raíz
      - name: Terraform Init & Validate
        run: |
          terraform init -upgrade -input=false
          terraform validate

      - name: Run TFLint
        run: |
          tflint --init
          tflint --recursive

  security-and-compliance:
    name: "Security (Checkov) & Compliance (OPA)"
    runs-on: ubuntu-latest
    needs: lint-and-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Checkov
        run: pip3 install checkov

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          sudo mv opa /usr/local/bin/

      # Generamos el plan en la raíz
      - name: Terraform Init & Plan JSON
        run: |
          terraform init -upgrade -input=false
          terraform plan -out=tfplan -input=false
          terraform show -json tfplan > tfplan.json

      - name: Run Checkov
        run: |
          checkov -f tfplan.json --skip-check CKV_AWS_158,CKV_AWS_338,CKV_AWS_290,CKV_AWS_355,CKV_AWS_135,CKV_AWS_126,CKV_AWS_382,CKV_AWS_130,CKV2_AWS_11,CKV2_AWS_12,CKV2_AWS_41

      # CORRECCIÓN: Como las políticas .rego están en la raíz, las llamamos directamente sin "../../"
      - name: OPA Policy Compliance Check
        run: |
          echo "--- 1. Validando Instancias y Seguridad (Analysis) ---"
          RESULT_ANALYSIS=$(opa eval -i tfplan.json -d instancias.rego "data.terraform.analysis.violation" --format json || echo "ERROR_OPA")
          echo "Debug Analisis: $RESULT_ANALYSIS"
          if [[ "$RESULT_ANALYSIS" == "ERROR_OPA" ]]; then exit 1; fi
          echo "$RESULT_ANALYSIS" | tr -d '[:space:]' | grep -q '\[\]' || exit 1

          echo "--- 2. Validando Nombre y Autorización (Authz) ---"
          RESULT_NAME=$(opa eval -i tfplan.json -d terraform_name_check.rego "data.terraform.authz.allow" --format json || echo "ERROR_OPA")
          echo "Debug Name: $RESULT_NAME"
          if [[ "$RESULT_NAME" == "ERROR_OPA" ]]; then exit 1; fi
          echo "$RESULT_NAME" | grep -q '"status":[[:space:]]*true' || exit 1

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  deploy:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    needs: security-and-compliance
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ./

      - name: Terraform Apply
        run: |
          terraform init -upgrade -input=false
          terraform apply -auto-approve tfplan

      - name: Upload State
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: terraform.tfstate

  destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    needs: deploy
    environment: destroy-approval
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Download State
        uses: actions/download-artifact@v4
        with:
          name: terraform-state
          path: ./

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Destroy
        run: |
          terraform init -upgrade -input=false
          terraform destroy -auto-approve
